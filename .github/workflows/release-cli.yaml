name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Cross-compile binaries
        run: |
          ldflags="-X github.com/fwilkerson/sigil-cli/cmd/buildinfo.Version=${VERSION} -X github.com/fwilkerson/sigil-cli/cmd/buildinfo.Commit=${GITHUB_SHA::7} -X github.com/fwilkerson/sigil-cli/cmd/buildinfo.TrustAddr=sigil-trust.dev:443"
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -tags release -ldflags "$ldflags" -o "dist/sigil-${os}-${arch}" .
            done
          done

      - name: Generate checksums
        run: cd dist && shasum -a 256 sigil-* > checksums.txt

      - name: Generate per-binary sha256 sidecars
        run: |
          for f in dist/sigil-darwin-* dist/sigil-linux-*; do
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done

      - name: Include install script
        run: cp scripts/install.sh dist/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        run: gh release create ${{ github.ref_name }} --repo ${{ github.repository }} --title "Sigil CLI ${{ github.ref_name }}" --generate-notes dist/*

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Write version file
        run: echo "${GITHUB_REF_NAME#v}" > dist/version

      - uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_HOST }} ${{ vars.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Upload artifacts to server
        run: scp dist/sigil-* dist/checksums.txt dist/version dist/install.sh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/sigil-trust/dist/

      - name: Verify deployment
        run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} cat /opt/sigil-trust/dist/version
